<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="차은정">
    <meta name="keywords" content="html, css, 웹디자인, UI/UX, 모션그래픽, 포트폴리오, 문의">
    <meta name="description" content="차은정에게 웹디자인, 모션그래픽 및 포트폴리오 관련 문의를 남겨주세요.">
    <meta name="robots" content="noindex, nofollow">

    <!-- favicon -->
    <link rel="icon" href="./images/차은정파비콘완성.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png">

    <title>Contact | 차은정 포트폴리오</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/app.css">
</head>
<body class="contact-page" tabindex="0">

    <header id="header" class="header sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a href="index.html" class="navbar-brand">
                    <img class="logo-img" src="./images/차은정파비콘완성.png" alt="EJ 로고">
                    EJ. Portfolio
                </a>
                <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="navbarNav" class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="index.html#about" class="nav-link">About</a></li>
                        <li class="nav-item"><a href="./portfolio.html" class="nav-link">Portfolio</a></li>
                        <li class="nav-item"><a href="contact.html" class="nav-link active" aria-current="page">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="main" class="main">

        <!-- Contact hero -->
        <section class="contact-hero">
            <div class="container text-center">
                <h1 class="contact-hero-title">Contact</h1>
                <p class="contact-hero-text">
                    웹디자인, 모션그래픽 및 포트폴리오에 관한 문의를 남겨주세요.<br>
                    확인 후 연락드리겠습니다.
                </p>
            </div>
        </section>

        <!-- Breadcrumb -->
        <nav class="contact-breadcrumb" aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Contact</li>
                </ol>
            </div>
        </nav>

        <!-- Contact body -->
        <section class="py-5 my-4">
            <div class="container py-4">
                <div class="row g-4">
                    <div class="col-lg-5">
                        <div class="contact-info-item">
                            <span class="icon">@</span>
                            <div>
                                <div class="fw-semibold">Email</div>
                                <div class="text-muted">cej3968@gmail.com</div>
                            </div>
                        </div>
                        <div class="contact-info-item">
                            <span class="icon">◎</span>
                            <div>
                                <div class="fw-semibold">Location</div>
                                <div class="text-muted">Busan, South Korea</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <form id="contactForm" class="contact-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <input type="text" id="contactName" class="form-control" placeholder="Your Name" required>
                                </div>
                                <div class="col-md-6">
                                    <input type="email" id="contactEmail" class="form-control" placeholder="Your Email" required>
                                </div>
                                <div class="col-12">
                                    <input type="text" id="contactSubject" class="form-control" placeholder="Subject">
                                </div>
                                <div class="col-12">
                                    <textarea id="contactMessage" class="form-control" rows="5" placeholder="Message" required></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn text-white">Send Message</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer id="footer" class="footer bg-dark py-4">
        <div class="container text-center text-white-50">
            <div class="social-links d-flex justify-content-center">
                <a href="https://www.instagram.com/jeffreymom_?utm_source=qr" class="instagram" target="_blank" rel="noopener noreferrer"><i class="bi bi-instagram"></i></a>
                <a href="https://youtube.com/channel/UCrbnqWOwD2SfGnQJ9VqlPsA?si=srikTHkJJjBekJJ8" class="youtube" target="_blank" rel="noopener noreferrer"><i class="bi bi-youtube"></i></a>
            </div>
            
            <div class="footer-copyright">
             <p>
                © 2026 
                <a href="#home" class="footer-a text-white">
                <strong>EJ Portfolio</strong>
                </a> . All rights reserved.
                
             </p>

             <p>
                Designed &amp; Developed by 
                <strong>EJ Cha</strong>
             </p>
            </div>
                        
        </div>
    </footer>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
